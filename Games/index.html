<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Portal - WebPhp5</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.5);
            --gradient-1: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Decorative Background Elements */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
        }
        .blob-1 { top: -100px; left: -100px; width: 400px; height: 400px; background: #3b82f6; }
        .blob-2 { bottom: -100px; right: -100px; width: 300px; height: 300px; background: #8b5cf6; }

        header {
            padding: 4rem 2rem 2rem;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            margin-bottom: 0.5rem;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.2rem;
            font-weight: 300;
        }

        main {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
            width: 100%;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 1.5rem;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--transition);
            position: relative;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px -12px var(--accent-glow);
            border-color: rgba(56, 189, 248, 0.3);
        }

        .card-image {
            height: 180px;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        /* Specific Game Icons/Styles */
        .card-image.hitung-cepat {
            background: linear-gradient(135deg, #ef4444 0%, #f59e0b 100%);
        }

        .card-icon {
            font-size: 4rem;
            color: white;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
            transition: var(--transition);
        }

        .game-card:hover .card-icon {
            transform: scale(1.1) rotate(5deg);
        }

        .card-content {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .game-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .game-desc {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.5;
            flex: 1;
            margin-bottom: 1.5rem;
        }

        .play-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0.75rem;
            font-weight: 600;
            transition: var(--transition);
            color: var(--accent);
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .game-card:hover .play-btn {
            background: var(--accent);
            color: #0f172a;
            border-color: var(--accent);
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-top: auto;
        }

        @media (max-width: 640px) {
            h1 { font-size: 2.5rem; }
            .game-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <header>
        <h1>Game Portal</h1>
        <p class="subtitle">Select a game to start playing</p>
    </header>

    <main>
        <div class="game-grid">
            <!-- Hitung Cepat -->
            <a href="./hitungcepat/index.html" class="game-card">
                <div class="card-image hitung-cepat">
                    <span class="card-icon">🧮</span>
                </div>
                <div class="card-content">
                    <h2 class="game-title">Hitung Cepat</h2>
                    <p class="game-desc">Test your math skills with this fast-paced calculation game. Race against the clock!</p>
                    <span class="play-btn">Play Now</span>
                </div>
            </a>

            <!-- Placeholder for future games -->
            <!-- 
            <a href="#" class="game-card" style="opacity: 0.5; pointer-events: none;">
                <div class="card-image" style="background: #334155;">
                    <span class="card-icon">🔒</span>
                </div>
                <div class="card-content">
                    <h2 class="game-title">Coming Soon</h2>
                    <p class="game-desc">More exciting games are under development.</p>
                    <span class="play-btn">Locked</span>
                </div>
            </a>
            -->
        </div>
    </main>

    <footer>
        <p>&copy; 2026 WebPhp5 Game Portal. Created with Antigravity.</p>
    </footer>

</body>
</html>
